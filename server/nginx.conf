# NGINX config for Olempic panel + API server (52.54.172.121)
# Copy to /etc/nginx/sites-available/olempic and symlink to sites-enabled, then: sudo nginx -t && sudo systemctl reload nginx

# Upstream — Go API (ozzy-back-main) on port 8080
upstream olempic_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

# Redirect HTTP -> HTTPS (uncomment when SSL is ready)
# server { listen 80; server_name your-domain.com; return 301 https://$host$request_uri; }

server {
    listen 80;
    # listen 443 ssl http2;
    # ssl_certificate     /etc/ssl/certs/your-domain.crt;
    # ssl_certificate_key /etc/ssl/private/your-domain.key;

    server_name 52.54.172.121 localhost;
    root /var/www/olempic-panel;
    index dashboard.html;

    # Panel (static)
    location / {
        try_files $uri $uri/ /dashboard.html;
        add_header Cache-Control "public, max-age=300";
    }

    # API — proxy to Go backend
    location /api/ {
        proxy_pass http://olempic_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Auth endpoint used by panel
    location /api/v1/auth/ {
        proxy_pass http://olempic_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: translate endpoint if you add it to the backend
    location /api/v1/translate {
        proxy_pass http://olempic_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type application/json;
    }
}
